name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter native-assets experiment
        run: flutter config --enable-native-assets

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip --quiet

      - name: Install Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('**/Cargo.lock') }
          restore-keys: cargo-

      - name: Install cargo-ndk and wasm-bindgen-cli
        run: |
          cargo install cargo-ndk --locked --version 3.5.4
          cargo install wasm-bindgen-cli --locked

      - name: Set up Android NDK
        run: |
          NDK_VERSION=27.0.12077973
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" > $GITHUB_ENV
          echo "$ANDROID_HOME/ndk/${NDK_VERSION}/tolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Install libclang
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang
          LIBCLANG=$(dirname $(find /usr/lib /usr/lib64 -name 'libclang.so*' 2>/dev/null | head -1))
          echo "LIBCLANG_PATH=$LIBCLANG" >> $GITHUB_ENV

      - name: Patch build.gradle.kts for Linux
        working-directory: aps/flutter/app/android/app
        run: |
          python3 - <<'PY'
          import re
          p = "build.gradle.kts"
          s = open(p, encoding="utf-8").read()

          # 1) 删除整个 release 签名配置块（编译 debug 不需要 keystore）
          s = re.sub(r'\n[ \t]*signingConfigs\s*\{.*?\n    \}', '', s, flags=re.DOTALL)

          # 2) release 构建改用 debug 签名
          s = s.replace('signingConfigs.getByName("release")', 'signingConfigs.getByName("debug")')

          # 3) Windows NDK 工具链路径 -> Linux
          s = s.replace('.resolve("windows-x86_64")', '.resolve("linux-x86_64")')

          # 4) 链接器 .cmd 后缀 -> 无后缀
          s = s.replace('${linkerPrefix}${apiLevel}-clang.cmd', '${linkerPrefix}${apiLevel}-clang')

          # 5) llvm-ar.exe -> llvm-ar
          s = s.replace('resolve("llvm-ar.exe")', 'resolve("llvm-ar")')

          # 6) Windows libclang 路径 -> 继承系统环境变量
          s = s.replace(
              'environment("LIBCLANG_PATH", operitLibclangDir.absolutePath)',
              'environment("LIBCLANG_PATH", System.getenv("LIBCLANG_PATH") ?: "")'
          )

          open(p, "w", encoding="utf-8").write(s)
          print("patched build.gradle.kts")
          PY

      - name: Create local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > apps/flutter/app/android/local.properties
          echo "sdk.dir=${ANDROID_HOME}" >> aps/flutter/app/android/local.properties

      - name: Flutter pub get
        working-directory: apps/flutter/app
        run: flutter pub get

      - name: Create stub web build directory
        working-directory: apps/flutter/app
        run: |
          mkdir -p build/web
          echo '<!DOCTYPE html><html><body></html>' > build/web/index.html
          mkdir -p assets/web_access

      - name: Build debug APK
        working-directory: apps/flutter/app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: operit2-debug
          path: apps/flutter/app/build/app/outputs/flutter-apk/appdebug.apk
          retention-days: 7
