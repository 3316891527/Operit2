name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Flutter native-assets experiment
        run: flutter config --enable-native-assets

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip --quiet

      - name: Install Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Install cargo-ndk and wasm-bindgen-cli
        run: |
          cargo install cargo-ndk --locked --version 3.5.4
          cargo install wasm-bindgen-cli --locked

      - name: Set up Android NDK
        run: |
          NDK_VERSION=27.0.12077973
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> $GITHUB_ENV
          echo "$ANDROID_HOME/ndk/${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Create local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > apps/flutter/app/android/local.properties
          echo "sdk.dir=${ANDROID_HOME}" >> apps/flutter/app/android/local.properties

      - name: Flutter pub get
        working-directory: apps/flutter/app
        run: flutter pub get

      - name: Build Web first
        working-directory: apps/flutter/app
        run: flutter build web --release

      - name: Build debug APK
        working-directory: apps/flutter/app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: operit2-debug
          path: apps/flutter/app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
      - name: Build Web first (generates wasm + web assets for APK bundling)
        working-directory: apps/flutter/app
        run: flutter build web --release

      - name: Build debug APK
        working-directory: apps/flutter/app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: operit2-debug
          path: apps/flutter/app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7          name: operit2-debug
          path: apps/flutter/app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
